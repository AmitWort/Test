<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>תורים</title>
<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #74ebd5, #ACB6E5);
  margin: 0; 
}

h1 {
  text-align: center;
  color: white;
  margin-top: 20px;
}

.container {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 40px;
  flex-wrap: wrap;
}

.card {
  background: white;
  padding: 25px;
  width: 250px;
  border-radius: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  text-align: center;
}

button {
  background: #3498db;
  color: white;
  border: none;
  padding: 12px;
  margin-top: 10px;
  width: 100%;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #2980b9;
}

.number {
  font-size: 28px;
  margin-top: 15px;
  color: #2c3e50;
  font-weight: bold;
}
</style>
</head>
<body>

<h1>🏥 מערכת תורים לרופא</h1>

<div class="container">

  <div class="card">
    <h2>קח מספר</h2>
    <button onclick="takeNumber()">קבל תור</button>
    <div id="myNumber" class="number">--</div>
  </div>

  <div class="card">
    <h2>תור נוכחי</h2>
    <div id="current" class="number">0</div>
    <button onclick="nextNumber()">הבא</button>
  </div>

</div>

<script>
let currentNumber = 0;
let nowServing = 0;

function speak(text) {
  let msg = new SpeechSynthesisUtterance(text);
  msg.lang = "he-IL"; // עברית
  speechSynthesis.speak(msg);
}

function takeNumber() {
  currentNumber++;
  document.getElementById("myNumber").innerText = currentNumber;
}

function nextNumber() {
  if (nowServing < currentNumber) {
    nowServing++;
    document.getElementById("current").innerText = nowServing;

    // הכרזה קולית
    speak("מספר " + nowServing + " נא להיכנס");
  }
}
</script>

</body>
</html>

<script>

let allPatients = [];

let currentPatient = null;

let selectedAvatar = '👤';
 
const defaultConfig = {

  system_title: 'מערכת בדיקת סמים',

  clinic_name: 'מרפאת הבריאות',

  bg_color: '#0f0f1a',

  surface_color: '#1a1a2e',

  accent_color: '#00d4aa',

  text_color: '#e5e7eb',

  danger_color: '#ff4757',

  font_family: 'Noto Sans Hebrew',

  font_size: 14

};
 
// Element SDK

window.elementSdk.init({

  defaultConfig,

  onConfigChange: async (config) => {

    const t = config.system_title || defaultConfig.system_title;

    const c = config.clinic_name || defaultConfig.clinic_name;

    const bg = config.bg_color || defaultConfig.bg_color;

    const sf = config.surface_color || defaultConfig.surface_color;

    const ac = config.accent_color || defaultConfig.accent_color;

    const tx = config.text_color || defaultConfig.text_color;

    const dn = config.danger_color || defaultConfig.danger_color;

    const ff = config.font_family || defaultConfig.font_family;

    const fs = config.font_size || defaultConfig.font_size;
 
    document.getElementById('mainTitle').textContent = t;

    document.getElementById('clinicName').textContent = c;

    document.body.style.backgroundColor = bg;

    document.body.style.color = tx;

    document.body.style.fontFamily = `${ff}, sans-serif`;

    document.body.style.fontSize = `${fs}px`;
 
    document.querySelectorAll('.bg-surface, header').forEach(el => el.style.backgroundColor = sf);

  },

  mapToCapabilities: (config) => ({

    recolorables: [

      { get: () => config.bg_color || defaultConfig.bg_color, set: v => { config.bg_color = v; window.elementSdk.setConfig({bg_color:v}); }},

      { get: () => config.surface_color || defaultConfig.surface_color, set: v => { config.surface_color = v; window.elementSdk.setConfig({surface_color:v}); }},

      { get: () => config.text_color || defaultConfig.text_color, set: v => { config.text_color = v; window.elementSdk.setConfig({text_color:v}); }},

      { get: () => config.accent_color || defaultConfig.accent_color, set: v => { config.accent_color = v; window.elementSdk.setConfig({accent_color:v}); }},

      { get: () => config.danger_color || defaultConfig.danger_color, set: v => { config.danger_color = v; window.elementSdk.setConfig({danger_color:v}); }},

    ],

    borderables: [],

    fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: v => { config.font_family = v; window.elementSdk.setConfig({font_family:v}); }},

    fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: v => { config.font_size = v; window.elementSdk.setConfig({font_size:v}); }}

  }),

  mapToEditPanelValues: (config) => new Map([

    ['system_title', config.system_title || defaultConfig.system_title],

    ['clinic_name', config.clinic_name || defaultConfig.clinic_name]

  ])

});
 
// Data SDK

const dataHandler = {

  onDataChanged(data) {

    allPatients = data;

    renderQueue();

  }

};
 
(async () => {

  const r = await window.dataSdk.init(dataHandler);

  if (!r.isOk) showToast('שגיאה באתחול המערכת', true);

})();
 
// Date display

document.getElementById('dateDisplay').textContent = new Date().toLocaleDateString('he-IL', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
 
function showView(view) {

  document.getElementById('listView').classList.toggle('hidden', view !== 'list');

  document.getElementById('formView').classList.toggle('hidden', view !== 'form');

  document.getElementById('examView').classList.toggle('hidden', view !== 'exam');

}
 
function openNewPatient() {

  selectedAvatar = '👤';

  document.getElementById('avatarPreview').textContent = '👤';

  document.getElementById('fName').value = '';

  document.getElementById('fAge').value = '';

  document.getElementById('fSymptoms').value = '';

  showView('form');

}
 
function pickAvatar(e) {

  selectedAvatar = e;

  document.getElementById('avatarPreview').textContent = e;

}
 
async function submitPatient() {

  const name = document.getElementById('fName').value.trim();

  const age = parseInt(document.getElementById('fAge').value);

  const symptoms = document.getElementById('fSymptoms').value.trim();

  if (!name || !age) { showToast('נא למלא שם וגיל'); return; }

  if (allPatients.length >= 999) { showToast('הגעת למגבלת המטופלים', true); return; }
 
  const btn = document.getElementById('submitBtn');

  btn.disabled = true; btn.textContent = 'שומר...';
 
  const r = await window.dataSdk.create({

    name, age, avatar_seed: selectedAvatar, symptoms: symptoms || 'לא צוינו',

    status: 'waiting', test_results: '', doctor_decision: '',

    created_at: new Date().toISOString()

  });
 
  btn.disabled = false; btn.textContent = 'הוסף לתור';

  if (r.isOk) { showToast('מטופל נוסף לתור ✓'); showView('list'); }

  else showToast('שגיאה בשמירה', true);

}
 
function renderQueue() {

  const container = document.getElementById('patientQueue');

  const empty = document.getElementById('emptyState');
 
  if (allPatients.length === 0) {

    container.innerHTML = '';

    empty.classList.remove('hidden');

    return;

  }

  empty.classList.add('hidden');
 
  const existingEls = new Map([...container.children].map(el => [el.dataset.id, el]));

  const sorted = [...allPatients].sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
 
  sorted.forEach(p => {

    const id = p.__backendId;

    let el = existingEls.get(id);

    if (el) {

      updateCard(el, p);

      existingEls.delete(id);

    } else {

      el = createCard(p);

      container.appendChild(el);

    }

  });

  existingEls.forEach(el => el.remove());

  lucide.createIcons();

}
 
function statusBadge(s) {

  const m = {

    waiting: { text:'ממתין', cls:'bg-blue-500/20 text-blue-400' },

    testing: { text:'בבדיקה', cls:'bg-warn/20 text-warn' },

    approved: { text:'בריא ✅', cls:'bg-emerald-500/20 text-emerald-400' },

    retest: { text:'בדיקה חוזרת ⚠️', cls:'bg-warn/20 text-warn' },

    reported: { text:'נרקומן 🚨', cls:'bg-danger/20 text-danger' }

  };

  return m[s] || m.waiting;

}
 
function createCard(p) {

  const el = document.createElement('div');

  el.dataset.id = p.__backendId;

  updateCard(el, p);

  return el;

}
 
function updateCard(el, p) {

  const s = statusBadge(p.status);

  el.className = 'bg-surface rounded-xl p-4 border border-gray-700/50 flex items-center gap-4 hover:border-gray-600 transition-colors cursor-pointer';

  el.onclick = () => openExam(p);

  el.innerHTML = `
<div class="w-12 h-12 rounded-full bg-accent/10 flex items-center justify-center text-2xl shrink-0">${p.avatar_seed||'👤'}</div>
<div class="flex-1 min-w-0">
<div class="flex items-center gap-2">
<span class="font-bold text-white truncate">${p.name}</span>
<span class="text-xs text-gray-500">גיל ${p.age}</span>
</div>
<p class="text-xs text-gray-400 truncate mt-0.5">${p.symptoms}</p>
</div>
<span class="px-3 py-1 rounded-full text-xs font-semibold shrink-0 ${s.cls}">${s.text}</span>
<button onclick="event.stopPropagation(); deletePatient('${p.__backendId}')" class="p-1.5 rounded-lg hover:bg-danger/20 text-gray-500 hover:text-danger transition-colors shrink-0">
<i data-lucide="trash-2" class="w-4 h-4"></i>
</button>

  `;

}
 
async function deletePatient(id) {

  const p = allPatients.find(x => x.__backendId === id);

  if (!p) return;

  const r = await window.dataSdk.delete(p);

  if (r.isOk) showToast('מטופל הוסר');

  else showToast('שגיאה במחיקה', true);

}
 
function openExam(p) {

  currentPatient = p;

  document.getElementById('examAvatar').textContent = p.avatar_seed || '👤';

  document.getElementById('examName').textContent = p.name;

  document.getElementById('examAge').textContent = `גיל ${p.age}`;

  document.getElementById('examSymptoms').textContent = p.symptoms;
 
  const sb = statusBadge(p.status);

  const se = document.getElementById('examStatus');

  se.textContent = sb.text;

  se.className = `px-3 py-1 rounded-full text-xs font-semibold ${sb.cls}`;
 
  const hasResults = p.test_results && p.test_results.length > 0;

  const hasDecision = p.doctor_decision && p.doctor_decision.length > 0;
 
  document.getElementById('preTest').classList.toggle('hidden', hasResults);

  document.getElementById('testRunning').classList.add('hidden');

  document.getElementById('testResults').classList.toggle('hidden', !hasResults);

  document.getElementById('decisionArea').classList.toggle('hidden', !hasResults || hasDecision);

  document.getElementById('decisionMade').classList.toggle('hidden', !hasDecision);
 
  if (hasResults) renderResults(JSON.parse(p.test_results));

  if (hasDecision) showDecisionResult(p.doctor_decision);
 
  showView('exam');

  lucide.createIcons();

}
 
const substances = [

  { name: 'THC (קנאביס)', key: 'thc' },

  { name: 'קוקאין', key: 'cocaine' },

  { name: 'אמפטמין', key: 'amphetamine' },

  { name: 'אופיואידים', key: 'opioids' },

  { name: 'בנזודיאזפינים', key: 'benzo' },

  { name: 'מתאמפטמין', key: 'meth' }

];
 
function generateResults() {

  return substances.map(s => {

    const r = Math.random();

    let status = 'clean'; // 60% clean

    if (r > 0.85) status = 'found'; // 15%

    else if (r > 0.6) status = 'suspect'; // 25%

    return { ...s, status };

  });

}
 
function startTest() {

  document.getElementById('preTest').classList.add('hidden');

  document.getElementById('testRunning').classList.remove('hidden');
 
  const fluid = document.getElementById('tubeFluid');

  const beam = document.getElementById('scanBeam');

  const bar = document.getElementById('progressBar');
 
  fluid.style.height = '0%';

  bar.style.width = '0%';

  beam.style.top = '0';
 
  void fluid.offsetWidth; // reflow

  fluid.classList.add('tube-fill');

  beam.classList.add('scan-line');

  bar.classList.add('progress-fill');
 
  setTimeout(async () => {

    fluid.classList.remove('tube-fill');

    beam.classList.remove('scan-line');

    bar.classList.remove('progress-fill');
 
    const results = generateResults();

    document.getElementById('testRunning').classList.add('hidden');

    document.getElementById('testResults').classList.remove('hidden');

    document.getElementById('decisionArea').classList.remove('hidden');
 
    renderResults(results);
 
    // Save results

    if (currentPatient) {

      currentPatient.test_results = JSON.stringify(results);

      currentPatient.status = 'testing';

      await window.dataSdk.update(currentPatient);

    }

    lucide.createIcons();

  }, 3500);

}
 
function renderResults(results) {

  const grid = document.getElementById('resultsGrid');

  grid.innerHTML = results.map(r => {

    const icons = { clean: '✅', found: '❌', suspect: '⚠️' };

    const labels = { clean: 'נקי', found: 'נמצא', suspect: 'חשוד' };

    const colors = { clean: 'text-emerald-400', found: 'text-danger', suspect: 'text-warn' };

    return `<div class="flex items-center gap-2 bg-bg/50 rounded-lg px-3 py-2">
<span class="text-lg">${icons[r.status]}</span>
<div class="flex-1 min-w-0">
<span class="text-sm text-white block truncate">${r.name}</span>
<span class="text-xs ${colors[r.status]}">${labels[r.status]}</span>
</div>
</div>`;

  }).join('');

}
 
async function makeDecision(decision) {

  if (!currentPatient) return;

  currentPatient.doctor_decision = decision;

  currentPatient.status = decision;
 
  document.getElementById('decisionArea').classList.add('hidden');

  showDecisionResult(decision);

  document.getElementById('decisionMade').classList.remove('hidden');
 
  const r = await window.dataSdk.update(currentPatient);

  if (r.isOk) showToast('ההחלטה נשמרה ✓');

  else showToast('שגיאה בשמירה', true);

}
 
function showDecisionResult(d) {

  const m = {

    approved: { icon: '✅', text: 'המטופל אושר - בריא', color: 'text-emerald-400' },

    retest: { icon: '🔄', text: 'נשלח לבדיקה חוזרת', color: 'text-warn' },

    reported: { icon: '🚨', text: 'דווח כנרקומן', color: 'text-danger' }

  };

  const info = m[d] || m.approved;

  document.getElementById('decisionIcon').textContent = info.icon;

  const dt = document.getElementById('decisionText');

  dt.textContent = info.text;

  dt.className = `font-bold text-lg ${info.color}`;

}
 
function showToast(msg, isError) {

  const t = document.getElementById('toast');

  t.textContent = msg;

  t.style.borderColor = isError ? '#ff4757' : '#00d4aa';

  t.style.opacity = '1';

  setTimeout(() => t.style.opacity = '0', 2500);

}
 
showView('list');

lucide.createIcons();
</script>
