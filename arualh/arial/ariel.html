<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>חנות עוגיות 🍪</title>
<style>
body {
    font-family: Arial;
    direction: rtl;
    background: #fff8f0;
    text-align: center;
}

h1 { color: #8b4513; }

.product {
    border: 1px solid #ccc;
    padding: 10px;
    margin: 10px;
    display: inline-block;
    width: 200px;
    background: white;
}

button {
    background: brown;
    color: white;
    border: none;
    padding: 8px;
    cursor: pointer;
}

#cart {
    margin-top: 20px;
    padding: 10px;
    background: #ffe4c4;
}
</style>
</head>

<body>

<h1>🍪 חנות עוגיות</h1>

<div id="products"></div>

<div id="cart">
    <h2>🛒 עגלה</h2>
    <div id="cartItems"></div>
    
    <input type="text" id="name" placeholder="שם">
    <input type="text" id="phone" placeholder="טלפון">
    <br><br>
    <button onclick="order()">הזמן עכשיו</button>
</div>

<hr>

<h2>🔒 הנהלה</h2>
<input type="password" id="adminPass" placeholder="סיסמה">
<button onclick="login()">כניסה</button>

<div id="adminPanel" style="display:none;">
    <h3>הוספת מוצר</h3>
    <input type="text" id="newName" placeholder="שם עוגיה">
    <input type="number" id="newPrice" placeholder="מחיר">
    <button onclick="addProduct()">הוסף</button>
</div>

<script>
let products = [
    {name: "עוגיית שוקולד", price: 5},
    {name: "עוגיית חמאה", price: 4}
];

let cart = [];

function renderProducts() {
    let html = "";
    products.forEach((p, index) => {
        html += `
        <div class="product">
            <h3>${p.name}</h3>
            <p>מחיר: ₪${p.price}</p>
            <button onclick="addToCart(${index})">הוסף לעגלה</button>
        </div>`;
    });
    document.getElementById("products").innerHTML = html;
}

function addToCart(index) {
    cart.push(products[index]);
    renderCart();
}

function renderCart() {
    let html = "";
    cart.forEach(item => {
        html += `<p>${item.name} - ₪${item.price}</p>`;
    });
    document.getElementById("cartItems").innerHTML = html;
}

function order() {
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;

    if (!name || !phone) {
        alert("תמלא שם וטלפון");
        return;
    }

    alert("הזמנה נשלחה!\nשם: " + name + "\nטלפון: " + phone);
    cart = [];
    renderCart();
}

function login() {
    let pass = document.getElementById("adminPass").value;
    if (pass === "1234") {
        document.getElementById("adminPanel").style.display = "block";
    } else {
        alert("סיסמה שגויה");
    }
}

function addProduct() {
    let name = document.getElementById("newName").value;
    let price = document.getElementById("newPrice").value;

    if (!name || !price) {
        alert("תמלא הכל");
        return;
    }

    products.push({name, price});
    renderProducts();
}

renderProducts();
</script>

</body>
</html>
